<!-- CART BUTTON -->
<button class="icon-btn cart-btn" title="Cart" (click)="toggleCart()">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <circle cx="9" cy="21" r="1" stroke-width="2"/>
    <circle cx="20" cy="21" r="1" stroke-width="2"/>
    <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </svg>

  <span class="cart-badge" *ngIf="totalQuantity > 0">
    {{ totalQuantity }}
  </span>
</button>


<!-- OVERLAY -->
<div class="overlay" *ngIf="cartOpen" (click)="closeCart()"></div>

<!-- RIGHT DRAWER -->
<div class="cart-drawer" [class.open]="cartOpen">

  <!-- HEADER -->
  <div class="cart-header">
    <h2>Your Cart</h2>
    <button class="close-btn" (click)="closeCart()">✕</button>
  </div>

  <!-- EMPTY -->
  <div class="empty" *ngIf="items.length === 0">
    Your cart is empty
  </div>

  <!-- ITEMS -->
  <div class="cart-body" *ngIf="items.length > 0">
    <div class="cart-item" *ngFor="let item of items">

      <img [src]="item.image" [alt]="item.name">

      <div class="item-info">
        <h4>{{ item.name }}</h4>
        <p class="price">₹{{ item.price }}</p>

        <div class="qty-controls">
          <button (click)="updateQuantity(item.id, item.quantity - 1)">-</button>
          <span>{{ item.quantity }}</span>
          <button (click)="updateQuantity(item.id, item.quantity + 1)">+</button>
          <button class="remove" (click)="removeItem(item.id)">🗑</button>
        </div>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <div class="cart-footer" *ngIf="items.length > 0">
    <div class="total">
      <span>Total</span>
      <strong>₹{{ total }}</strong>
    </div>

    <button class="checkout-btn" (click)="closeCart()">
      Place Order via WhatsApp
    </button>

    <button class="clear-btn" (click)="clearCart()">
      Clear Cart
    </button>
  </div>

</div>
