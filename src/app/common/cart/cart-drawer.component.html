<div class="overlay" *ngIf="cartOpen" (click)="closeCart()" (keydown.escape)="closeCart()" aria-hidden="true"></div>

<aside class="cart-drawer" [class.open]="cartOpen" aria-label="Shopping cart">

  <div class="drawer-header">
    <div class="drawer-title-row">
      <h2 class="drawer-title">Your Cart</h2>
      <span class="item-count" *ngIf="items.length > 0">{{ totalQuantity }} item{{ totalQuantity !== 1 ? 's' : '' }}</span>
    </div>
    <button class="drawer-close" (click)="closeCart()" aria-label="Close cart">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="drawer-empty" *ngIf="items.length === 0">
    <div class="empty-icon">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/>
        <circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>
      </svg>
    </div>
    <h3 class="empty-title">Your cart is empty</h3>
    <p class="empty-sub">Add some beautiful bangles to get started!</p>
    <button class="btn-continue" (click)="closeCart()">Continue Shopping</button>
  </div>

  <div class="drawer-body" *ngIf="items.length > 0">
    <div class="cart-items">
      <div class="cart-item" *ngFor="let item of items">

        <div class="item-img-wrap">
          <img [src]="item.image" [alt]="item.name" class="item-img" loading="lazy">
        </div>

        <div class="item-details">
          <h4 class="item-name">{{ item.name }}</h4>
          <div class="item-price">₹{{ item.price }}</div>

          <div class="item-controls">
            <div class="qty-row">
              <button class="qty-btn" (click)="updateQuantity(item.id, item.quantity - 1)" aria-label="Decrease quantity" [disabled]="item.quantity <= 1">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
              </button>
              <span class="qty-val">{{ item.quantity }}</span>
              <button class="qty-btn" (click)="updateQuantity(item.id, item.quantity + 1)" aria-label="Increase quantity">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <line x1="12" y1="5" x2="12" y2="19"/>
                  <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
              </button>
            </div>

            <button class="remove-btn" (click)="removeItem(item.id)" [attr.aria-label]="'Remove ' + item.name">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
              </svg>
              Remove
            </button>
          </div>

          <div class="item-subtotal">₹{{ item.price * item.quantity }}</div>
        </div>

      </div>
    </div>
  </div>

  <div class="drawer-footer" *ngIf="items.length > 0">
    <div class="order-summary">
      <div class="summary-row">
        <span>Subtotal</span>
        <span>₹{{ total }}</span>
      </div>
      <div class="summary-row">
        <span>Shipping</span>
        <span class="free-ship">Free</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-row total-row">
        <strong>Total</strong>
        <strong>₹{{ total }}</strong>
      </div>
    </div>

    <button class="btn-checkout" (click)="closeCart()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884"/>
      </svg>
      Order via WhatsApp
    </button>

    <button class="btn-clear" (click)="clearCart()">Clear Cart</button>
  </div>

</aside>
