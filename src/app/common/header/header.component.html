<header class="site-header" [class.scrolled]="isScrolled">

  <!-- Top Announcement Bar -->
  <div class="announcement-bar">
    <div class="container">
      <div class="announcement-inner">
        <span class="announcement-text">
          <span class="announcement-icon">✦</span>
          Free Shipping on Orders Above ₹999 &nbsp;|&nbsp; Handcrafted in Firozabad Since 1965
          <span class="announcement-icon">✦</span>
        </span>
        <a href="tel:+919876543210" class="announcement-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 015.13 12.7 19.79 19.79 0 012.06 4.11 2 2 0 014.07 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
          +91 98765 43210
        </a>
      </div>
    </div>
  </div>

  <!-- Main Navigation -->
  <nav class="main-nav">
    <div class="container">
      <div class="nav-inner">

        <!-- Logo -->
        <a routerLink="/" class="logo" (click)="navigateTo('/')">
          <img src="assets/favicon.png" alt="Firozabad Bangles" class="logo-img">
          <div class="logo-text">
            <span class="logo-brand">Firozabad</span>
            <span class="logo-sub">Bangles</span>
          </div>
        </a>

        <!-- Desktop Nav Links -->
        <ul class="nav-links" role="menubar">
          <li role="none">
            <a routerLink="/" class="nav-link" [class.active]="isActive('/')" role="menuitem">
              Collections
            </a>
          </li>
          <li role="none">
            <a routerLink="/about-us" class="nav-link" [class.active]="isActive('/about-us')" role="menuitem">
              Our Story
            </a>
          </li>
          <li role="none">
            <a routerLink="/glass" class="nav-link" [class.active]="isActive('/glass')" role="menuitem">
              Glass Art
            </a>
          </li>
          <li role="none">
            <a routerLink="/bangles" class="nav-link" [class.active]="isActive('/bangles')" role="menuitem">
              Bangles
            </a>
          </li>
        </ul>

        <!-- Actions -->
        <div class="nav-actions">

          <!-- Search Toggle (Desktop) -->
          <button class="icon-action desktop-only" (click)="toggleSearch()" [class.active]="isSearchOpen" aria-label="Search">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <path d="M21 21l-4.35-4.35"/>
            </svg>
          </button>

          <!-- Wishlist -->
          <button class="icon-action desktop-only" aria-label="Wishlist">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
            </svg>
          </button>

          <!-- Account -->
          <button class="icon-action desktop-only" aria-label="Account">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </button>

          <!-- Cart -->
          <button class="icon-action cart-action" (click)="openCart()" aria-label="Shopping cart">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="21" r="1"/>
              <circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>
            </svg>
            <span class="cart-count" *ngIf="cartItemCount > 0" [attr.aria-label]="cartItemCount + ' items in cart'">
              {{ cartItemCount > 9 ? '9+' : cartItemCount }}
            </span>
          </button>

          <!-- Mobile Hamburger -->
          <button class="hamburger-btn mobile-only" (click)="toggleMobileMenu()" [class.open]="isMobileMenuOpen" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>

      <!-- Desktop Search Bar (expandable) -->
      <div class="search-bar-wrapper" [class.open]="isSearchOpen">
        <form class="search-form" (submit)="onSearch($event)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
          <input
            type="search"
            class="search-input"
            [(ngModel)]="searchQuery"
            name="q"
            placeholder="Search for bangles, glass art..."
            autocomplete="off"
            aria-label="Search products">
          <button type="submit" class="search-submit">Search</button>
        </form>
      </div>

      <!-- Mobile Search Bar -->
      <div class="mobile-search">
        <form class="search-form" (submit)="onSearch($event)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
          <input
            type="search"
            class="search-input"
            [(ngModel)]="searchQuery"
            name="qm"
            placeholder="Search products..."
            aria-label="Search products">
        </form>
      </div>
    </div>
  </nav>

  <!-- Mobile Drawer Menu -->
  <div class="mobile-menu" [class.open]="isMobileMenuOpen" role="dialog" aria-label="Navigation menu">
    <div class="mobile-menu-header">
      <span class="mobile-menu-title">Menu</span>
      <button class="mobile-close-btn" (click)="toggleMobileMenu()" aria-label="Close menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <nav class="mobile-nav">
      <a routerLink="/" class="mobile-link" [class.active]="isActive('/')" (click)="navigateTo('/')">
        Collections
      </a>
      <a routerLink="/about-us" class="mobile-link" [class.active]="isActive('/about-us')" (click)="navigateTo('/about-us')">
        Our Story
      </a>
      <a routerLink="/glass" class="mobile-link" [class.active]="isActive('/glass')" (click)="navigateTo('/glass')">
        Glass Art
      </a>
      <a routerLink="/bangles" class="mobile-link" [class.active]="isActive('/bangles')" (click)="navigateTo('/bangles')">
        Bangles
      </a>
      <div class="mobile-divider"></div>
      <a href="tel:+919876543210" class="mobile-link mobile-contact">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 015.13 12.7a19.79 19.79 0 01-3.07-8.67A2 2 0 014.07 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
        +91 98765 43210
      </a>
    </nav>
  </div>

  <!-- Overlay -->
  <div class="nav-overlay" [class.active]="isMobileMenuOpen || isSearchOpen" (click)="isMobileMenuOpen = false; isSearchOpen = false;"></div>

</header>
